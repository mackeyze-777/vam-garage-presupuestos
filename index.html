<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050505">
<title>VAM Garage — Presupuestos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#050505; --bg2:#0c0c0c; --bg3:#131313; --line:#1e1e1e; --line2:#2c2c2c;
  --accent:#e8178a; --text:#f0f0f0; --text2:#cfd0d4; --muted:#808490;
  --green:#27c76f; --yellow:#f0a500; --red:#e04040;
  --pad:clamp(16px,4.5vw,28px); --hh:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;line-height:1.5;min-height:100dvh;padding-bottom:calc(96px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased}
.wrap{max-width:780px;margin:0 auto;padding:0 var(--pad)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

header{position:sticky;top:0;z-index:30;background:rgba(5,5,5,.85);backdrop-filter:blur(14px);border-top:3px solid var(--accent);border-bottom:1px solid var(--line)}
.hd{display:flex;align-items:center;gap:12px;padding:11px 0}
.logo{width:38px;height:38px;border-radius:11px;background:var(--accent);color:#050505;display:grid;place-items:center;font-weight:800;font-size:19px;flex-shrink:0}
.hd h1{font-size:16px;font-weight:800;letter-spacing:.3px}
.hd p{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px}

h2.sec{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin:22px 0 12px;display:flex;align-items:center;gap:10px}
h2.sec::after{content:"";flex:1;height:1px;background:var(--line)}

.seg{display:flex;gap:8px;margin:18px 0 6px}
.seg button{flex:1;min-height:48px;background:var(--bg2);border:1px solid var(--line);color:var(--text2);font:inherit;font-weight:700;font-size:15px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,border-color .15s,color .15s,transform .1s}
.seg button .ic{font-size:18px}
.seg button.on{background:var(--accent);color:#050505;border-color:var(--accent)}
.seg button:active{transform:scale(.98)}

.fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fld{display:flex;flex-direction:column;gap:6px}
.fld.full{grid-column:1/-1}
.fld label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700}
.fld input{background:var(--bg2);border:1px solid var(--line);border-radius:10px;height:46px;padding:0 13px;color:var(--text);font:inherit;font-size:15px}
.fld input:focus{outline:none;border-color:var(--accent)}
.fld input::placeholder{color:#5b5f6b}

.search{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:0 13px;height:46px;margin-bottom:12px}
.search svg{color:var(--muted);flex-shrink:0}
.search input{flex:1;background:none;border:0;outline:0;color:var(--text);font:inherit;font-size:15px}
.search input::placeholder{color:#5b5f6b}
.srcbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:-2px 0 12px;font-size:11px;color:var(--muted)}
.srcbar #srcnote{text-transform:uppercase;letter-spacing:.5px}
.srcbar button{background:var(--bg2);border:1px solid var(--line);color:var(--text2);font:inherit;font-size:11px;font-weight:700;padding:7px 12px;border-radius:8px;cursor:pointer;min-height:34px;flex-shrink:0;transition:border-color .15s,transform .1s}
.srcbar button:active{transform:scale(.96)}
@media(hover:hover){.srcbar button:hover{border-color:var(--accent);color:var(--text)}}
.loading{text-align:center;color:var(--muted);padding:30px 10px;font-size:13px;line-height:1.5}
.addrow{display:flex;gap:8px;margin-bottom:10px}
.addrow input{background:var(--bg2);border:1px solid var(--line);border-radius:10px;height:46px;padding:0 12px;color:var(--text);font:inherit;font-size:14px}
.addrow input:focus{outline:none;border-color:var(--accent)}
.addrow #c-nom{flex:1;min-width:0}
.addrow #c-pre{width:84px;text-align:right}
.addrow #c-add{flex-shrink:0;background:var(--bg3);border:1px solid var(--line);color:var(--text);font:inherit;font-weight:700;font-size:14px;padding:0 14px;border-radius:10px;cursor:pointer;min-height:46px;transition:border-color .15s,transform .1s}
.addrow #c-add:active{transform:scale(.97)}
@media(hover:hover){.addrow #c-add:hover{border-color:var(--accent)}}
.citem{display:flex;align-items:center;gap:10px;background:rgba(232,23,138,.06);border:1px solid var(--accent);border-radius:11px;padding:11px 13px;margin-bottom:8px}
.citem .cn{flex:1;min-width:0;font-weight:600;font-size:14px;word-break:break-word}
.citem .cp{font-weight:700;font-size:14px;white-space:nowrap}
.citem .cx{flex-shrink:0;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--muted);font-size:17px;cursor:pointer;display:grid;place-items:center}
.citem .cx:active{transform:scale(.92)}

.catg{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);font-weight:700;margin:16px 0 8px}
.svc{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s}
.svc:active{background:var(--bg3)}
.svc.on{border-color:var(--accent);background:rgba(232,23,138,.06)}
.svc .ck{width:24px;height:24px;border-radius:7px;border:2px solid var(--line2);flex-shrink:0;display:grid;place-items:center;transition:.15s}
.svc.on .ck{background:var(--accent);border-color:var(--accent)}
.svc .ck svg{width:14px;height:14px;opacity:0;transform:scale(.5);transition:.15s}
.svc.on .ck svg{opacity:1;transform:scale(1)}
.svc .nm{flex:1;min-width:0}
.svc .nm b{font-weight:600;font-size:14.5px;display:block}
.svc .nm small{font-size:11.5px;color:var(--muted)}
.svc .pr{display:flex;align-items:center;gap:4px;flex-shrink:0}
.svc .pr span{color:var(--muted);font-size:13px}
.svc .pr input{width:78px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;height:36px;padding:0 8px;color:var(--text);font:inherit;font-weight:700;font-size:14px;text-align:right}
.svc .pr input:focus{outline:none;border-color:var(--accent)}

.notes{margin-top:8px}
.notes textarea{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:12px 13px;color:var(--text);font:inherit;font-size:14px;resize:vertical;min-height:64px}
.notes textarea:focus{outline:none;border-color:var(--accent)}

.bar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(5,5,5,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:12px var(--pad) calc(12px + env(safe-area-inset-bottom))}
.bar-in{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:14px}
.bar .tot{flex:1}
.bar .tot .c{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.bar .tot .v{font-size:22px;font-weight:800;line-height:1.1}
.bar button{min-height:50px;background:var(--accent);color:#050505;border:0;font:inherit;font-weight:800;font-size:15px;padding:0 22px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:filter .15s,transform .1s}
.bar button:disabled{background:var(--bg3);color:var(--muted);cursor:not-allowed}
.bar button:not(:disabled):active{transform:scale(.97)}

/* ===== Cotización (preview + imagen) ===== */
.ov{position:fixed;inset:0;z-index:100;display:none;background:rgba(0,0,0,.8);backdrop-filter:blur(7px);overflow:auto;padding:16px 12px 40px}
.ov.open{display:block;animation:ovbg .2s ease-out}
.ov-panel{max-width:560px;margin:0 auto}
.ov-act{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.ov-act button{min-height:44px;border:1px solid var(--line2);background:var(--bg2);color:var(--text);font:inherit;font-weight:700;font-size:13.5px;padding:0 16px;border-radius:11px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:border-color .15s,filter .15s,transform .1s}
.ov-act button.go{background:var(--green);color:#04210f;border-color:var(--green)}
.ov-act button:active{transform:scale(.97)}

.q{background:#fff;color:#16181d;border-radius:12px;overflow:hidden}
.q-band{height:6px;background:var(--accent)}
.q-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:18px 22px 14px}
.q-brand{display:flex;gap:11px;align-items:center}
.q-mark{width:40px;height:40px;border-radius:9px;background:#050505;color:var(--accent);display:grid;place-items:center;font-weight:800;font-size:21px}
.q-name{font-weight:800;font-size:15px;letter-spacing:3px}
.q-sub{font-size:8.5px;color:#8a8d96;letter-spacing:1.4px;text-transform:uppercase;margin-top:3px}
.q-doc{text-align:right}
.q-doc-t{font-weight:800;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.q-doc-s{font-size:9px;color:#777;margin-top:4px;line-height:1.5}
.q-cli{margin:0 22px;padding:13px 0;border-top:1px solid #e9eaed;border-bottom:1px solid #e9eaed;display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.q-cli .r{font-size:12px}
.q-cli .r b{display:block;font-size:8.5px;text-transform:uppercase;letter-spacing:1px;color:#9a9da4;margin-bottom:2px;font-weight:700}
.q-svcs{padding:6px 22px 0}
.q-it{padding:11px 0;border-bottom:1px solid #f0f1f3}
.q-it .top{display:flex;justify-content:space-between;gap:12px;align-items:baseline}
.q-it .top b{font-size:13.5px;font-weight:700}
.q-it .top .p{font-size:14px;font-weight:800;white-space:nowrap}
.q-it ul{list-style:none;margin-top:5px;display:flex;flex-wrap:wrap;gap:3px 12px}
.q-it li{font-size:10.5px;color:#6a6e76;display:flex;gap:4px;align-items:baseline}
.q-it li::before{content:"✓";color:var(--accent);font-weight:800;font-size:9px}
.q-lines{margin:8px 22px 0}
.q-line{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;color:#555}
.q-line.desc{color:var(--accent);font-weight:700}
.q-tot{display:flex;justify-content:space-between;align-items:center;margin:4px 22px 0;padding:12px 0 4px;border-top:2px solid #16181d}
.q-tot .l{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:#777;font-weight:700}
.q-tot .v{font-size:26px;font-weight:800;color:#16181d}
.q-note{margin:10px 22px 0;font-size:10px;color:#888c93;line-height:1.5}
.q-cond{margin:12px 22px 0;padding:10px 13px;background:#fdeef6;border:1px solid var(--accent);border-radius:8px;font-size:11px;font-weight:700;color:#a31368;display:flex;gap:7px;align-items:center}
.q-cta{margin:9px 22px 0;font-size:11.5px;color:#444;line-height:1.55}
.q-cta b{color:#a31368}
.q-foot{margin-top:12px;padding:11px 22px 20px;border-top:1px solid #eef0f2;font-size:10px;color:#9a9da4;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.empty-q{text-align:center;color:var(--muted);padding:40px;font-size:14px}
.toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:var(--green);color:#04210f;font-weight:700;font-size:13px;padding:10px 18px;border-radius:999px;z-index:200;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
@keyframes ovbg{from{opacity:0}to{opacity:1}}
.ov.open .ov-panel{animation:ovin .26s cubic-bezier(.34,1.4,.64,1) both}
@keyframes ovin{from{opacity:0;transform:translateY(12px) scale(.985)}to{opacity:1;transform:none}}
@media(hover:hover){
  .seg button:hover{border-color:var(--line2);color:var(--text)}
  .seg button.on:hover{color:#050505}
  .svc:hover{border-color:var(--line2)}
  .svc.on:hover{border-color:var(--accent)}
  .search:hover{border-color:var(--line2)}
  .bar button:not(:disabled):hover{filter:brightness(1.08)}
  .ov-act button:hover{border-color:var(--accent)}
  .ov-act button.go:hover{filter:brightness(1.08)}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header><div class="wrap hd">
  <div class="logo">V</div>
  <div><h1>VAM Garage</h1><p>Presupuestos</p></div>
</div></header>

<main class="wrap">
  <h2 class="sec">Datos del cliente</h2>
  <div class="fields">
    <div class="fld full"><label>Nombre del cliente</label><input id="f-nom" placeholder="Ej. Juan Pérez"></div>
    <div class="fld"><label>Placa (opcional)</label><input id="f-pla" placeholder="ABC-123-A"></div>
    <div class="fld"><label>Fecha</label><input id="f-fec" type="date"></div>
    <div class="fld full"><label>Vehículo (marca y modelo)</label><input id="f-veh" placeholder="Ej. Toyota Hilux 2023"></div>
    <div class="fld full"><label>WhatsApp del cliente (opcional)</label><input id="f-tel" type="tel" placeholder="10 dígitos" inputmode="numeric"></div>
  </div>

  <h2 class="sec">Servicios</h2>
  <div class="srcbar"><span id="srcnote">Cargando precios de tu hoja…</span><button id="b-refresh" type="button">↻ Actualizar</button></div>
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="f-buscar" type="search" placeholder="Buscar servicio…" autocomplete="off">
  </div>
  <div id="lista"></div>

  <h2 class="sec">Servicio manual (opcional)</h2>
  <div class="addrow">
    <input id="c-nom" placeholder="Ej. Franjas / pinstripe" autocomplete="off">
    <input id="c-pre" type="number" inputmode="numeric" placeholder="$">
    <button id="c-add" type="button">+ Agregar</button>
  </div>
  <div id="c-list"></div>

  <h2 class="sec">Descuento</h2>
  <div class="seg" id="segDisc">
    <button data-d="0" class="on">Ninguno</button>
    <button data-d="10">10%</button>
    <button data-d="15">15%</button>
    <button data-d="20">20%</button>
  </div>

  <h2 class="sec">Notas (opcional)</h2>
  <div class="notes"><textarea id="f-notas" placeholder="Ej. Incluye lavado de cortesía · Aplica descuento por paquete"></textarea></div>
</main>

<div class="bar"><div class="bar-in">
  <div class="tot"><div class="c"><span id="b-cnt">0</span> servicios</div><div class="v" id="b-tot">$0</div></div>
  <button id="b-ver" disabled>Ver cotización →</button>
</div></div>

<div class="ov" id="ov"><div class="ov-panel">
  <div class="ov-act">
    <button class="go" id="a-share">📲 Compartir imagen</button>
    <button id="a-wa">💬 WhatsApp (texto)</button>
    <button id="a-close">✕ Cerrar</button>
  </div>
  <div class="q" id="quote"></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s);
const money=n=>'$'+Math.round(n).toLocaleString('es-MX');
const esc=s=>String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
let desc=0, sel={}, query='', customs=[];
function quoteLines(){
  const a=SVC.filter(s=>sel[s.id]!=null).map(s=>({n:s.n,price:+sel[s.id]||0,inc:s.inc}));
  const b=customs.map(c=>({n:c.n,price:+c.price||0,inc:[]}));
  return a.concat(b);
}
function renderCustoms(){
  const root=$('#c-list'); root.innerHTML='';
  customs.forEach((c,i)=>{
    const el=document.createElement('div'); el.className='citem';
    el.innerHTML=`<span class="cn">${esc(c.n)}</span><span class="cp">${money(c.price)}</span><button class="cx" type="button" aria-label="Quitar">×</button>`;
    el.querySelector('.cx').onclick=()=>{ customs.splice(i,1); renderCustoms(); updateBar(); };
    root.appendChild(el);
  });
}
function addCustom(){
  const n=$('#c-nom').value.trim(), p=+$('#c-pre').value||0;
  if(!n||p<=0){ toast('Pon nombre y costo'); return; }
  customs.push({n,price:p}); $('#c-nom').value=''; $('#c-pre').value='';
  renderCustoms(); updateBar(); $('#c-nom').focus();
}
$('#f-fec').value=new Date().toISOString().slice(0,10);

/* ===== Precios EN VIVO desde tu Google Sheet de costos (una sola fuente) =====
   Misma hoja que el dashboard de costos. Cambias un precio ahí → aquí se refleja. */
const CSV_URL='https://docs.google.com/spreadsheets/d/1UqaOw2jmD24uN8avQisEeKCfYgDPEMtrLIHYhHXXpU0/gviz/tq?tqx=out:csv&gid=777960188';
const CATS=['Cerámico','Pulido','Interior','Paquete','PPF','Adicionales'];
let SVC=[];
// alcances (lo que incluye) por nombre del servicio en la hoja
const INC={
 'Ceramico mate 2 años':['Descontaminación','Clay bar','Preparación especial para mate','Aplicación cerámico mate','Garantía 2 años'],
 '1 paso + ceramico 1 años':['Lavado y descontaminación','Eco Wash','Clay bar','Corrección 1 paso','Aplicación CanCoat Evo','Garantía 1 año','Inspección con luz'],
 '1 paso + 3 años':['Lavado y descontaminación','Clay bar','Corrección 1 paso','Aplicación cerámico 3 años','Garantía 3 años','Reporte antes/después'],
 '2 pasos + ceramico 1 año':['Descontaminación completa','Clay bar','Corrección paso 1 cutting','Corrección paso 2','Aplicación CanCoat Evo','Garantía 1 año','Reporte fotográfico'],
 '2 pasos + 3 años':['Descontaminación completa','Clay bar','Corrección paso 1 cutting','Corrección paso 2 refinado','Aplicación cerámico 3 años','Garantía 3 años','Reporte HD'],
 '2 pasos + 5 anios (doble capa)':['Descontaminación 4 etapas','Clay bar premium','Corrección 2 pasos nivel concurso','Aplicación Pure Evo 5 años','Garantía 5 años','Reporte HD','Kit de mantenimiento'],
 'Vestiduras mantenimiento':['Aspirado completo','Limpieza de tablero y consola','Limpieza de puertas','Vidrios interiores','Fragancia final'],
 'Vestiduras avanzado':['Extracción de asientos y tapetes','Limpieza química de plásticos','Tablero y consola','Cinturones','Desinfección con ozono','Fragancia de acabado'],
 'Pulido 3-1 (1 paso)':['Lavado y descontaminación','Corrección 1 paso','Refinado de pintura','Acabado gloss alto brillo','Protección final'],
 'Correccion de pintura (2 pasos)':['Lavado y descontaminación','Clay bar','Corrección paso 1 cutting','Corrección paso 2 refinado','Acabado alta gloss'],
 'Pulido + Vestiduras + motor':['Pulido exterior completo','Vestiduras interior','Limpieza de motor','Descontaminación','Acabado y protección'],
 'Lavado':['Enjuague a presión','Lavado con shampoo premium','Descontaminación básica','Secado con microfibra','Brillo final'],
 'Faros':['Lijado progresivo por grados','Pulido mecánico','Sellado UV protector','Brillo restaurado','Protección aprox. 1 año'],
 'Motor':['Protección de componentes eléctricos','Aplicación de desengrasante','Enjuague controlado','Secado','Acondicionamiento de plásticos'],
 'Cera + descontaminacion':['Lavado','Descontaminación química (hierro)','Clay bar','Aplicación de cera/sellador','Brillo y protección'],
 'Pulido + cera':['Lavado y descontaminación','Corrección a 1 paso','Aplicación de cera / sellador','Brillo profundo','Protección hidrofóbica'],
};
function parseCSV(txt){const rows=[];let row=[],cur='',q=false;for(let i=0;i<txt.length;i++){const ch=txt[i];if(q){if(ch==='"'){if(txt[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}else{if(ch==='"')q=true;else if(ch===','){row.push(cur);cur='';}else if(ch==='\n'||ch==='\r'){if(ch==='\r'&&txt[i+1]==='\n')i++;row.push(cur);rows.push(row);row=[];cur='';}else cur+=ch;}}if(cur!==''||row.length){row.push(cur);rows.push(row);}return rows;}
function priceVal(s){s=String(s||'').trim();if(!s)return 0;const n=parseFloat(s.replace(/[^\d.]/g,''));if(!isFinite(n))return 0;return s.includes('%')?Math.round(n/100):Math.round(n);}
function catOf(t){t=(t||'').trim();if(/cer[aá]mico/i.test(t))return 'Cerámico';if(/pulido/i.test(t))return 'Pulido';if(/interior/i.test(t))return 'Interior';if(/paquete/i.test(t))return 'Paquete';return 'Adicionales';}
// Limpia ortografía de los nombres de la hoja solo para mostrar (no cambia la hoja)
function clean(n){return n.replace(/anios/gi,'años').replace(/ceramico/gi,'cerámico').replace(/correccion/gi,'Corrección').replace(/descontaminacion/gi,'descontaminación').replace(/\b1 años\b/g,'1 año');}
// Nombres ÉPICOS (jul-2026): el cliente no compara "Armadura VAM" en Google, sí compara "cerámico 3 años".
// Escalera: ESCUDO (1 año) → ARMADURA (3 años) → TITÁN (5 años). Clave = nombre de la hoja en minúsculas.
const EPIC={
 '1 paso + cerámico 1 año':'ESCUDO VAM · Cerámico 1 año (corrección 1 paso)',
 '2 pasos + cerámico 1 año':'ESCUDO VAM+ · Cerámico 1 año (corrección profunda 2 pasos)',
 '1 paso + 3 años':'ARMADURA VAM · Cerámico 3 años (corrección 1 paso)',
 '2 pasos + 3 años':'ARMADURA VAM+ · Cerámico 3 años (corrección profunda 2 pasos)',
 'cerámico mate 2 años':'ARMADURA MATE · Cerámico mate 2 años',
 '2 pasos + 5 años':'TITÁN VAM · Cerámico 5 años doble capa (corrección profunda)',
 'pulido + cera':'EFECTO SHOWROOM · Pulido + Encerado',
 'pulido 3-1 (1 paso)':'SHOWROOM EXPRESS · Pulido 3-en-1',
 'corrección de pintura (2 pasos)':'CIRUGÍA DE PINTURA · Corrección 2 pasos',
 'vestiduras mantenimiento':'INTERIOR FRESH · Vestiduras mantenimiento',
 'vestiduras avanzado':'INTERIOR CERO KM · Vestiduras avanzado',
 'pulido + vestiduras + motor':'TRANSFORMACIÓN TOTAL · Pulido + Vestiduras + Motor',
 'lavado':'LAVADO TÉCNICO VAM',
 'faros':'VISIÓN NUEVA · Restauración de faros',
 'motor':'SALA DE MÁQUINAS · Detallado de motor',
 'cera + descontaminación':'SELLO EXPRESS · Cera + descontaminación',
};
function epic(n){return EPIC[n.trim().toLowerCase()]||n;}
function rowsToSVC(rows){const out=[];rows.forEach((r,i)=>{const name=(r[0]||'').trim(),tipo=(r[1]||'').trim(),price=priceVal(r[7]);if(!name||!tipo||tipo.toLowerCase()==='tipo'||price<=0)return;out.push({id:'s'+i,n:epic(clean(name)),c:catOf(tipo),price,inc:INC[name]||[]});});return out;}
// Servicios que aún NO están en la hoja (se agregan a mano hasta que Mackey los meta a la hoja)
// PPF: precios en rango → se pone el "desde" (extremo bajo) y el precio es editable en pantalla.
// Kit Interior: servicio por piezas $1,000–$2,500 → default $1,000 editable.
const EXTRAS=[
  {id:'ppf1',n:'BLINDAJE INVISIBLE · PPF Parcial Front · Profilm 3 años',c:'PPF',price:7000,inc:['Facia delantera','Faros','Parcial de cofre y salpicaderas','Película Profilm','Duración aprox. 3 años']},
  {id:'ppf2',n:'BLINDAJE INVISIBLE · PPF Parcial Front · 3M 5 años',c:'PPF',price:9000,inc:['Facia delantera','Faros','Parcial de cofre y salpicaderas','Película 3M','Duración aprox. 5 años']},
  {id:'ppf3',n:'BLINDAJE INVISIBLE · PPF Full Front · Profilm 3 años',c:'PPF',price:12000,inc:['Salpicaderas','Cofre','Facia delantera','Retrovisores','Faros','Película Profilm','Duración aprox. 3 años']},
  {id:'ppf4',n:'BLINDAJE INVISIBLE · PPF Full Front · 3M 5 años',c:'PPF',price:15000,inc:['Salpicaderas','Cofre','Facia delantera','Retrovisores','Faros','Película 3M','Duración aprox. 5 años']},
  {id:'ppf5',n:'BLINDAJE INVISIBLE · PPF Full Body · Profilm 3 años',c:'PPF',price:32000,inc:['Protección completa de carrocería','Película Profilm','Duración aprox. 3 años','Precio final según detalles a cubrir']},
  {id:'ppf6',n:'BLINDAJE INVISIBLE · PPF Full Body · 3M 5 años',c:'PPF',price:43000,inc:['Protección completa de carrocería','Película 3M','Duración aprox. 5 años','Precio final según detalles a cubrir']},
  {id:'kitint1',n:'Kit Interior (por piezas)',c:'Interior',price:1000,inc:['Detallado de interior a la medida','Precio según número de piezas']},
];
async function loadSheet(){
  const cached=localStorage.getItem('vam_presup_svc');
  if(!SVC.length) $('#lista').innerHTML='<div class="loading">Cargando precios de tu hoja…</div>';
  try{
    const res=await fetch(CSV_URL,{cache:'no-store'});
    const data=rowsToSVC(parseCSV(await res.text()));
    if(data.length){ SVC=data; localStorage.setItem('vam_presup_svc',JSON.stringify(data)); $('#srcnote').textContent='Precios en vivo de tu hoja · '+data.length+' servicios'; }
    else if(cached){ SVC=JSON.parse(cached); $('#srcnote').textContent='Usando precios guardados'; }
  }catch(e){
    if(cached){ SVC=JSON.parse(cached); $('#srcnote').textContent='Sin conexión · precios guardados'; }
    else { $('#lista').innerHTML='<div class="loading">No se pudo leer la hoja. Revisa tu internet y dale ↻ Actualizar.</div>'; return; }
  }
  const norm=s=>s.toLowerCase().replace(/[^a-z0-9]/g,'');
  EXTRAS.forEach(x=>{ if(!SVC.some(s=>norm(s.n)===norm(x.n))) SVC.push(x); });
  renderLista(); updateBar();
}

function renderLista(){
  const root=$('#lista'); root.innerHTML='';
  CATS.forEach(cat=>{
    const items=SVC.filter(s=>s.c===cat && (!query || (s.n+' '+s.c).toLowerCase().includes(query)));
    if(!items.length) return;
    const h=document.createElement('div'); h.className='catg'; h.textContent=cat; root.appendChild(h);
    items.forEach(s=>{
      const on=sel[s.id]!=null;
      const row=document.createElement('div'); row.className='svc'+(on?' on':'');
      row.innerHTML=`<div class="ck"><svg viewBox="0 0 24 24" fill="none" stroke="#050505" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="nm"><b>${s.n}</b><small>${s.inc.length?s.inc.length+' puntos incluidos':'Precio de tu hoja'}</small></div>
        <div class="pr"><span>$</span><input type="number" inputmode="numeric" value="${on?sel[s.id]:s.price}" data-id="${s.id}"></div>`;
      // toggle al tocar (menos en el input)
      row.addEventListener('click',e=>{ if(e.target.tagName==='INPUT')return; toggle(s); });
      const inp=row.querySelector('input');
      inp.addEventListener('click',e=>e.stopPropagation());
      inp.addEventListener('input',e=>{ if(sel[s.id]!=null) sel[s.id]=+e.target.value||0; updateBar(); });
      root.appendChild(row);
    });
  });
}
function toggle(s){
  if(sel[s.id]!=null) delete sel[s.id];
  else sel[s.id]=s.price;
  renderLista(); updateBar();
}
function updateBar(){
  const lines=quoteLines();
  const sub=lines.reduce((a,l)=>a+l.price,0);
  const fin=Math.round(sub*(1-desc/100));
  $('#b-cnt').textContent=lines.length;
  $('#b-tot').textContent=money(fin);
  $('#b-ver').disabled=lines.length===0;
}

$('#b-refresh').onclick=()=>loadSheet();
$('#f-buscar').addEventListener('input',e=>{ query=e.target.value.trim().toLowerCase(); renderLista(); });
$('#segDisc').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return; desc=+b.dataset.d; document.querySelectorAll('#segDisc button').forEach(x=>x.classList.toggle('on',x===b)); updateBar(); });
$('#c-add').onclick=addCustom;
$('#c-pre').addEventListener('keydown',e=>{ if(e.key==='Enter') addCustom(); });

// ===== Cotización =====
const fmtDate=iso=>{const[y,m,d]=iso.split('-');return `${d}/${m}/${y}`};
const addDays=(iso,n)=>{const d=new Date(iso+'T00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};

function buildQuote(){
  const nom=$('#f-nom').value.trim()||'—';
  const pla=($('#f-pla').value.trim().toUpperCase())||'—';
  const veh=$('#f-veh').value.trim()||'—';
  const fec=$('#f-fec').value||new Date().toISOString().slice(0,10);
  const notas=$('#f-notas').value.trim();
  const folio='VAM-'+fec.slice(2).replace(/-/g,'')+'-'+new Date().toTimeString().slice(0,5).replace(':','');
  const vig=fmtDate(addDays(fec,15));
  const items=quoteLines();
  const sub=items.reduce((a,l)=>a+l.price,0);
  const fin=Math.round(sub*(1-desc/100)), dm=sub-fin;
  const rows=items.map(l=>`<div class="q-it"><div class="top"><b>${esc(l.n)}</b><span class="p">${money(l.price)}</span></div>${l.inc&&l.inc.length?`<ul>${l.inc.map(i=>`<li><span>${i}</span></li>`).join('')}</ul>`:''}</div>`).join('');
  $('#quote').innerHTML=`
   <div class="q-band"></div>
   <div class="q-head">
     <div class="q-brand"><div class="q-mark">V</div><div><div class="q-name">VAM GARAGE</div><div class="q-sub">Estudio automotriz · Pachuca</div></div></div>
     <div class="q-doc"><div class="q-doc-t">Cotización</div><div class="q-doc-s">${folio}<br>${fmtDate(fec)}</div></div>
   </div>
   <div class="q-cli">
     <div class="r"><b>Cliente</b>${nom}</div>
     <div class="r"><b>Vehículo</b>${veh}</div>
     <div class="r"><b>Placa</b>${pla}</div>
     <div class="r"><b>Vigencia</b>15 días (al ${vig})</div>
   </div>
   <div class="q-svcs">${rows}</div>
   ${desc>0?`<div class="q-lines"><div class="q-line"><span>Subtotal</span><span>${money(sub)}</span></div><div class="q-line desc"><span>Descuento ${desc}%</span><span>− ${money(dm)}</span></div></div>`:''}
   <div class="q-tot"><span class="l">Total${desc>0?' con descuento':''}</span><span class="v">${money(fin)} <span style="font-size:12px;color:#999;font-weight:600">MXN</span></span></div>
   ${notas?`<div class="q-note"><b>Notas:</b> ${notas}</div>`:''}
   <div class="q-cond">⏳ Cotización válida 15 días · sujeta a inspección física del vehículo</div>
   <div class="q-cta">¿Quieres hacer el servicio? Avísanos para contratarlo y agendar tu cita. 📲 WhatsApp <b>771 802 1389</b> — entre antes apartes, mejor disponibilidad.</div>
   <div class="q-foot"><span>📞 771 802 1389 · IG @vam.garage</span><span>Pachuca, Hidalgo</span></div>`;
}
function closeOv(){ $('#ov').classList.remove('open'); document.body.style.overflow=''; }
$('#b-ver').onclick=()=>{ if(!Object.keys(sel).length)return; buildQuote(); $('#ov').classList.add('open'); document.body.style.overflow='hidden'; };
$('#a-close').onclick=closeOv;
$('#ov').addEventListener('click',e=>{ if(e.target.id==='ov') closeOv(); });
addEventListener('keydown',e=>{ if(e.key==='Escape') closeOv(); });

// imagen
async function renderPng(){ const c=await html2canvas($('#quote'),{scale:2,backgroundColor:'#ffffff'}); return await new Promise(r=>c.toBlob(r,'image/png')); }
function dl(blob){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='cotizacion-vam.png'; a.click(); }
const SHARE_MSG='Te mandamos la cotización del servicio para tu carro 🚗\n\nRecuerda que esta cotización dura 15 días. Si quieres agendar, pregúntanos por los días disponibles o aparta tu lugar lo antes posible. 🗓️\n\n— VAM Garage';
async function shareImg(){
  try{
    const blob=await renderPng();
    const file=new File([blob],'cotizacion-vam.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:'Cotización VAM Garage',text:SHARE_MSG}); }
    else { dl(blob); toast('Imagen descargada — adjúntala en WhatsApp'); }
  }catch(e){ try{ dl(await renderPng()); toast('Imagen descargada'); }catch(_){ toast('No se pudo generar la imagen'); } }
}
function waText(){
  const items=quoteLines();
  const sub=items.reduce((a,l)=>a+l.price,0);
  const fin=Math.round(sub*(1-desc/100));
  const nom=$('#f-nom').value.trim(), veh=$('#f-veh').value.trim(), pla=$('#f-pla').value.trim().toUpperCase();
  let t='*VAM GARAGE — Cotización*\n';
  if(nom)t+='Cliente: '+nom+'\n';
  if(veh)t+='Vehículo: '+veh+'\n';
  if(pla)t+='Placa: '+pla+'\n';
  t+='\n';
  items.forEach(l=>{ t+='• '+l.n+' — '+money(l.price)+'\n'; });
  if(desc>0){ t+='Subtotal: '+money(sub)+'\n'; t+='Descuento '+desc+'%: - '+money(sub-fin)+'\n'; }
  t+='\n*TOTAL: '+money(fin)+' MXN*\n';
  t+='Vigencia: 15 días · sujeta a inspección física.\n';
  const notas=$('#f-notas').value.trim(); if(notas)t+='Notas: '+notas+'\n';
  t+='\n📍 Pachuca · 📞 771 802 1389 · IG @vam.garage';
  return t;
}
function sendWa(){ const tel=$('#f-tel').value.replace(/\D/g,''); window.open('https://wa.me/'+(tel?('52'+tel):'')+'?text='+encodeURIComponent(waText()),'_blank'); }
async function withBusy(btn,fn){ const t=btn.textContent; btn.disabled=true; btn.style.opacity=.55; btn.textContent='⏳ Generando…'; try{ await fn(); } finally{ btn.disabled=false; btn.style.opacity=''; btn.textContent=t; } }
$('#a-share').onclick=e=>withBusy(e.currentTarget,shareImg);
$('#a-wa').onclick=sendWa;
let tT; function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2600); }

loadSheet();
</script>
